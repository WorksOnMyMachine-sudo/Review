# 机型与爬取 URL 配置

defaults:
  request_delay_seconds: 2.0
  timeout_seconds: 45
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
  # 运行 scripts/save_amazon_state.py 后可自动带上登录 Cookie
  amazon_storage_state: "data/amazon_state.json"
  # 日常自动爬取建议 true；仅 setup 时会临时打开有界面浏览器
  amazon_playwright_headless: false
  # 爬取前用 .env 自动续登；失效时需再执行一次 amazon setup
  amazon_auto_login: false

